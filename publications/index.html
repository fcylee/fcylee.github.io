<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="Publications | FCYLee">
    <meta property="og:description" content="Selected publications by Flora Chi Yan Lee">
    <meta property="og:image" content="https://fcylee.github.io/images/logo.png">
    <meta property="og:url" content="https://fcylee.github.io/publications">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | FCYLee::RNA::Synapse</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
    <script src="/shared.js" defer></script>
    <script src="/bibtexParse.js" defer></script>
</head>
<body>
    <header id="header"></header>
    <div class="hero-banner">
        <div class="hero-banner-inner">
            <h1>Local RNA metabolism meets synapse (dys)function</h1>
            <hr class="hero-rule">
            <p class="hero-banner-byline">Publications</p>
        </div>
    </div>
    <main>
        <section class="active-white">
            <p>Full publication list can be found here: <a href="https://scholar.google.com/citations?user=xcTS8NkAAAAJ&hl=en" target="_blank">Google Scholar</a></p>
            <div id="pubhighlights" class="pubhighlights">
                <h3>Selected Publications</h3>
                <ul id="publications-list" class="publist"></ul>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>

    <script>
        function formatAuthors(raw) {
            if (!raw) return "Unknown authors";
            return raw.split(/\s+and\s+/).map(part => {
                let name = part.trim();
                if (/^others$/i.test(name)) return "et al.";
                // Highlight Flora's name in any of its forms
                if (/^lee,\s*flora/i.test(name)) {
                    name = "<strong>" + name + "</strong>";
                }
                return name;
            }).join(", ");
        }

        // Theme groups, in display order
        const PUB_GROUPS = [
            { key: "methods", title: "Method development" },
            { key: "condensation", title: "Protein–RNA interactions & condensation" },
            { key: "localrna", title: "Local RNA regulation & translation" },
        ];

        function renderItem(entry) {
            const title = entry.title || "Untitled";
            const authors = formatAuthors(entry.author || "");
            const year = entry.year || "";
            const journal = entry.journal || entry.booktitle || "";
            const note = entry.note ? `<span class="pub-note">${entry.note}</span>` : "";
            const doi = entry.doi ? `<a href="https://doi.org/${entry.doi}" target="_blank">DOI</a>` : "";
            const url = entry.url ? `<a href="${entry.url}" target="_blank">Full Text</a>` : "";
            return `
                <li class="publication-item">
                    <p class="pub-title">${title}</p>
                    <p class="pub-meta">${authors} <span class="pub-year">${year}</span> &middot; <em>${journal}</em> ${doi}${url ? " " + url : ""}</p>
                    ${note}
                </li>`;
        }

        async function loadPublications() {
            const pubList = document.getElementById("publications-list");
            try {
                const response = await fetch('/publications.bib');
                if (!response.ok) throw new Error("Failed to fetch BibTeX file.");

                const publications = bibtexParse.toJSON(await response.text());
                let html = "";

                PUB_GROUPS.forEach(group => {
                    const items = publications.filter(p =>
                        ((p.entryTags || {}).keywords || "").toLowerCase().includes(group.key));
                    if (!items.length) return;
                    html += `<li class="pub-group-header"><h4>${group.title}</h4></li>`;
                    items.forEach(p => { html += renderItem(p.entryTags || {}); });
                });

                pubList.innerHTML = html || "<li>No publications found.</li>";
            } catch (error) {
                console.error("Error loading publications:", error);
                pubList.innerHTML = "<li>Error loading publications.</li>";
            }
        }

        document.addEventListener("DOMContentLoaded", loadPublications);
    </script>
</body>
</html>
